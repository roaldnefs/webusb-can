<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebUSB CAN — Browser-based CAN Bus Interface</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0e17;
    --bg-secondary: #111827;
    --bg-card: #161f31;
    --bg-card-hover: #1c2640;
    --border: #1e2d4a;
    --border-active: #3b5998;
    --text-primary: #e2e8f0;
    --text-secondary: #8896b3;
    --text-muted: #5a6a8a;
    --accent-blue: #3b82f6;
    --accent-cyan: #06b6d4;
    --accent-green: #10b981;
    --accent-red: #ef4444;
    --accent-amber: #f59e0b;
    --accent-purple: #8b5cf6;
    --glow-blue: rgba(59, 130, 246, 0.15);
    --glow-green: rgba(16, 185, 129, 0.15);
    --glow-red: rgba(239, 68, 68, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; }

  /* ─── Header ─── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(10, 14, 23, 0.85);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    color: #fff;
    letter-spacing: -0.5px;
  }

  .header-title {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: 16px;
    letter-spacing: -0.3px;
  }

  .header-title span { color: var(--accent-green); }

  .status-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    border: 1px solid var(--border);
    background: var(--bg-secondary);
    transition: all 0.3s;
  }

  .status-chip.connected {
    border-color: rgba(16, 185, 129, 0.4);
    background: var(--glow-green);
    color: var(--accent-green);
  }

  .status-chip.disconnected {
    color: var(--text-muted);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: all 0.3s;
  }

  .status-chip.connected .status-dot {
    background: var(--accent-green);
    box-shadow: 0 0 8px var(--accent-green);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ─── Main Layout ─── */
  .main {
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: auto 1fr;
    gap: 0;
    height: calc(100vh - 65px);
  }

  /* ─── Sidebar ─── */
  .sidebar {
    grid-row: 1 / -1;
    border-right: 1px solid var(--border);
    background: var(--bg-secondary);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
  }

  .panel-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    transition: border-color 0.2s;
  }

  .card:hover { border-color: var(--border-active); }

  /* ─── Connect Button ─── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }

  .btn:hover { background: var(--bg-card-hover); border-color: var(--border-active); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent-blue), #2563eb);
    border-color: transparent;
    color: #fff;
  }

  .btn-primary:hover {
    background: linear-gradient(135deg, #4a90f7, var(--accent-blue));
    box-shadow: 0 0 20px var(--glow-blue);
  }

  .btn-danger {
    background: rgba(239, 68, 68, 0.1);
    border-color: rgba(239, 68, 68, 0.3);
    color: var(--accent-red);
  }

  .btn-danger:hover {
    background: rgba(239, 68, 68, 0.2);
    box-shadow: 0 0 20px var(--glow-red);
  }

  .btn-success {
    background: rgba(16, 185, 129, 0.1);
    border-color: rgba(16, 185, 129, 0.3);
    color: var(--accent-green);
  }

  .btn-success:hover {
    background: rgba(16, 185, 129, 0.2);
  }

  .btn-sm {
    padding: 7px 12px;
    font-size: 12px;
    border-radius: 8px;
  }

  /* ─── Form Controls ─── */
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 12px;
  }

  .form-group:last-child { margin-bottom: 0; }

  label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
  }

  select, input[type="text"], input[type="number"] {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  select:focus, input:focus {
    border-color: var(--accent-blue);
    box-shadow: 0 0 0 3px var(--glow-blue);
  }

  select { cursor: pointer; }
  select option { background: var(--bg-secondary); }

  /* ─── Top Bar (Stats) ─── */
  .stats-bar {
    display: flex;
    align-items: center;
    padding: 12px 24px;
    gap: 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(17, 24, 39, 0.5);
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .stat-value {
    color: var(--text-primary);
    font-weight: 600;
    min-width: 36px;
  }

  .stat-label { color: var(--text-muted); font-size: 11px; }

  /* ─── Message Log ─── */
  .log-area {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .log-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(17, 24, 39, 0.3);
  }

  .log-toolbar-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .filter-chip {
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-muted);
    transition: all 0.15s;
  }

  .filter-chip:hover { color: var(--text-secondary); }
  .filter-chip.active {
    background: var(--glow-blue);
    border-color: rgba(59, 130, 246, 0.3);
    color: var(--accent-blue);
  }

  .log-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
    scroll-behavior: smooth;
  }

  .log-scroll::-webkit-scrollbar { width: 6px; }
  .log-scroll::-webkit-scrollbar-track { background: transparent; }
  .log-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .log-entry {
    display: grid;
    grid-template-columns: 90px 32px 80px 1fr 60px;
    align-items: center;
    gap: 12px;
    padding: 6px 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    border-bottom: 1px solid rgba(30, 45, 74, 0.3);
    transition: background 0.1s;
    animation: fadeIn 0.15s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .log-entry:hover { background: rgba(59, 130, 246, 0.04); }

  .log-entry.tx-row {
    background: rgba(59, 130, 246, 0.04);
    border-left: 2px solid var(--accent-blue);
  }

  .log-time { color: var(--text-muted); font-size: 11px; }

  .log-dir {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 20px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
  }

  .log-dir.rx {
    background: rgba(16, 185, 129, 0.12);
    color: var(--accent-green);
  }

  .log-dir.tx {
    background: rgba(59, 130, 246, 0.12);
    color: var(--accent-blue);
  }

  .log-id { color: var(--accent-cyan); font-weight: 600; }

  .log-data { color: var(--text-primary); word-break: break-all; }

  .log-dlc {
    color: var(--text-muted);
    text-align: right;
    font-size: 11px;
  }

  /* ─── Send Panel ─── */
  .send-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 24px;
    border-top: 1px solid var(--border);
    background: var(--bg-secondary);
  }

  .send-bar input {
    flex: 1;
    background: var(--bg-primary);
  }

  .send-bar .id-input { width: 100px; flex: none; }
  .send-bar .dlc-input { width: 55px; flex: none; }
  .send-bar .interval-input { width: 72px; flex: none; }

  .btn-repeat {
    background: rgba(139, 92, 246, 0.1);
    border-color: rgba(139, 92, 246, 0.3);
    color: var(--accent-purple);
  }

  .btn-repeat:hover {
    background: rgba(139, 92, 246, 0.2);
  }

  .btn-repeat.active {
    background: rgba(239, 68, 68, 0.15);
    border-color: rgba(239, 68, 68, 0.4);
    color: var(--accent-red);
    animation: pulse-repeat 1.5s ease-in-out infinite;
  }

  .btn-repeat.active:hover {
    background: rgba(239, 68, 68, 0.25);
  }

  @keyframes pulse-repeat {
    0%, 100% { box-shadow: none; }
    50% { box-shadow: 0 0 10px rgba(239, 68, 68, 0.25); }
  }

  .interval-group {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: none;
    border-left: 1px solid var(--border);
    padding-left: 10px;
    margin-left: 2px;
  }

  .interval-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* ─── Signal Toggles ─── */
  .signal-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .signal-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    transition: all 0.2s;
  }

  .signal-row.active {
    border-color: rgba(16, 185, 129, 0.4);
    background: rgba(16, 185, 129, 0.06);
  }

  .signal-toggle {
    width: 36px;
    height: 20px;
    border-radius: 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .signal-toggle::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: all 0.2s;
  }

  .signal-toggle.on {
    background: var(--accent-green);
    border-color: var(--accent-green);
  }

  .signal-toggle.on::after {
    left: 18px;
    background: #fff;
  }

  .signal-info {
    flex: 1;
    min-width: 0;
  }

  .signal-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .signal-detail {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .signal-remove {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    padding: 2px;
    line-height: 1;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .signal-row:hover .signal-remove { opacity: 1; }
  .signal-remove:hover { color: var(--accent-red); }

  .add-signal-form {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  .add-signal-row {
    display: flex;
    gap: 4px;
  }

  .add-signal-row input {
    font-size: 11px;
    padding: 5px 8px;
  }

  .add-signal-row .sig-name-input { flex: 1; }
  .add-signal-row .sig-id-input { width: 60px; }
  .add-signal-row .sig-data-input { flex: 2; }
  .add-signal-row .sig-ms-input { width: 50px; }

  /* ─── Device Info ─── */
  .device-info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .info-item {
    background: var(--bg-primary);
    border-radius: 8px;
    padding: 10px;
  }

  .info-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  .info-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
  }

  /* ─── Empty state ─── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--text-muted);
    text-align: center;
    padding: 40px;
  }

  .empty-icon {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .empty-state h3 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .empty-state p { font-size: 13px; max-width: 300px; line-height: 1.5; }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }

  .checkbox-row input[type="checkbox"] {
    accent-color: var(--accent-blue);
  }

  .checkbox-row label {
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .main {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto 1fr;
    }
    .sidebar {
      grid-row: auto;
      border-right: none;
      border-bottom: 1px solid var(--border);
      max-height: 300px;
    }
  }
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo" style="background:linear-gradient(135deg, #10b981, #059669);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
          <rect x="6" y="6" width="12" height="12" rx="2"/>
          <line x1="1" y1="10" x2="6" y2="10"/>
          <line x1="1" y1="14" x2="6" y2="14"/>
          <line x1="18" y1="10" x2="23" y2="10"/>
          <line x1="18" y1="14" x2="23" y2="14"/>
          <line x1="10" y1="1" x2="10" y2="6"/>
          <line x1="14" y1="1" x2="14" y2="6"/>
          <line x1="10" y1="18" x2="10" y2="23"/>
          <line x1="14" y1="18" x2="14" y2="23"/>
        </svg>
      </div>
      <div class="header-title">WebUSB<span>CAN</span></div>
    </div>
    <div id="statusChip" class="status-chip disconnected">
      <div class="status-dot"></div>
      <span id="statusText">Disconnected</span>
    </div>
  </header>

  <!-- Main Grid -->
  <div class="main">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="panel-title">Connection</div>

      <div class="card" id="connectCard">
        <button id="connectBtn" class="btn btn-primary" onclick="handleConnect()">
          &#9654; Connect Device
        </button>
      </div>

      <div class="card">
        <div class="form-group">
          <label>Bitrate</label>
          <select id="bitrateSelect">
            <option value="10000">10 kbit/s</option>
            <option value="20000">20 kbit/s</option>
            <option value="50000">50 kbit/s</option>
            <option value="100000">100 kbit/s</option>
            <option value="125000">125 kbit/s</option>
            <option value="250000">250 kbit/s</option>
            <option value="500000" selected>500 kbit/s</option>
            <option value="800000">800 kbit/s</option>
            <option value="1000000">1 Mbit/s</option>
          </select>
        </div>
        <div class="form-group">
          <label>Mode</label>
          <select id="modeSelect">
            <option value="normal">Normal</option>
            <option value="loopback">Loopback</option>
            <option value="listenonly">Listen Only</option>
          </select>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="autoScroll" checked>
          <label for="autoScroll">Auto-scroll log</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="debugToggle" checked onchange="debugMode = this.checked">
          <label for="debugToggle">Debug to console (F12)</label>
        </div>
      </div>

      <div class="panel-title">Device Info</div>
      <div class="card" id="deviceInfoCard">
        <div class="device-info-grid" id="deviceInfo">
          <div class="info-item">
            <div class="info-label">Vendor</div>
            <div class="info-value" id="infoVendor">—</div>
          </div>
          <div class="info-item">
            <div class="info-label">Product</div>
            <div class="info-value" id="infoProduct">—</div>
          </div>
          <div class="info-item">
            <div class="info-label">VID:PID</div>
            <div class="info-value" id="infoVidPid">—</div>
          </div>
          <div class="info-item">
            <div class="info-label">Channels</div>
            <div class="info-value" id="infoChannels">—</div>
          </div>
        </div>
      </div>

      <div class="panel-title">Signals</div>
      <div class="card">
        <div class="signal-list" id="signalList">
          <!-- Signals will be rendered here -->
        </div>
        <div class="add-signal-form">
          <div class="add-signal-row">
            <input type="text" id="newSigName" class="sig-name-input" placeholder="Name">
            <input type="text" id="newSigId" class="sig-id-input" placeholder="ID (hex)">
          </div>
          <div class="add-signal-row">
            <input type="text" id="newSigData" class="sig-data-input" placeholder="Data (hex bytes)">
            <input type="number" id="newSigMs" class="sig-ms-input" placeholder="ms" min="10" max="5000" value="50">
          </div>
          <button class="btn btn-sm" onclick="addSignal()" style="margin-top:2px;">+ Add Signal</button>
        </div>
      </div>

      <div class="panel-title">OBD-II Queries</div>
      <div class="card">
        <div class="form-group">
          <label>One-shot requests</label>
          <div style="display:flex; gap:6px; flex-wrap:wrap; margin-top:4px;">
            <button class="btn btn-sm" onclick="quickSend('7DF','02 01 0C')">RPM</button>
            <button class="btn btn-sm" onclick="quickSend('7DF','02 01 0D')">Speed</button>
            <button class="btn btn-sm" onclick="quickSend('7DF','02 01 05')">Coolant</button>
          </div>
        </div>
      </div>
    </aside>

    <!-- Content Area -->
    <div class="log-area">
      <!-- Stats Bar -->
      <div class="stats-bar">
        <div class="stat">
          <span class="stat-label">RX</span>
          <span class="stat-value" id="rxCount">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">TX</span>
          <span class="stat-value" id="txCount">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Errors</span>
          <span class="stat-value" id="errCount">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Bus Load</span>
          <span class="stat-value" id="busLoad">—</span>
        </div>
        <div style="flex:1"></div>
        <button id="pauseBtn" class="btn btn-sm" onclick="togglePause()">Pause</button>
        <button class="btn btn-sm" onclick="clearLog()">Clear Log</button>
        <button class="btn btn-sm" onclick="exportLog()">Export CSV</button>
      </div>

      <!-- Log Toolbar -->
      <div class="log-toolbar">
        <div class="log-toolbar-left">
          <span class="filter-chip active" onclick="setFilter('all', this)">All</span>
          <span class="filter-chip" onclick="setFilter('rx', this)">RX</span>
          <span class="filter-chip" onclick="setFilter('tx', this)">TX</span>
        </div>
        <input type="text" id="filterInput" placeholder="Filter by ID (hex)..." style="width:160px; font-size:12px; padding:5px 10px;">
      </div>

      <!-- Log entries -->
      <div class="log-scroll" id="logScroll">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">&#128268;</div>
          <h3>No CAN messages yet</h3>
          <p>Connect your gs_usb compatible CAN adapter to start capturing CAN bus traffic.</p>
        </div>
      </div>

      <!-- Send Bar -->
      <div class="send-bar">
        <input type="text" id="sendId" class="id-input" placeholder="ID (hex)" maxlength="8" value="7DF">
        <input type="number" id="sendDlc" class="dlc-input" placeholder="DLC" min="0" max="8" value="8">
        <input type="text" id="sendData" placeholder="Data bytes (hex, e.g. 02 01 0C 00 00 00 00 00)" value="">
        <button class="btn btn-success btn-sm" onclick="handleSend()" style="width:auto; min-width:70px;">Send</button>
        <div class="interval-group">
          <input type="number" id="intervalMs" class="interval-input" placeholder="ms" min="1" max="60000" value="100">
          <span class="interval-label">ms</span>
          <button id="repeatBtn" class="btn btn-repeat btn-sm" onclick="toggleRepeat()" style="width:auto; min-width:80px;">Repeat</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  WebUSB CAN — browser-based CAN bus interface
// ═══════════════════════════════════════════════════════

// gs_usb vendor requests
const GS_USB_BREQ = {
  HOST_FORMAT:    0,
  BITTIMING:      1,
  MODE:           2,
  BERR:           3,
  BT_CONST:       4,
  DEVICE_CONFIG:  5,
  TIMESTAMP:      6,
  IDENTIFY:       7,
};

const GS_CAN_MODE = {
  RESET: 0,
  START: 1,
};

const GS_CAN_FEATURE = {
  LISTEN_ONLY: (1 << 0),
  LOOP_BACK:   (1 << 1),
};

// Known gs_usb compatible device IDs
const GS_USB_FILTERS = [
  // candleLight / CANable / CANable 2.0
  { vendorId: 0x1D50, productId: 0x606F },
];

// App state
let device = null;
let isConnected = false;
let isStarted = false;
let rxCount = 0;
let txCount = 0;
let errCount = 0;
let logEntries = [];
let currentFilter = 'all';
let readLoop = null;
let endpointIn = 1;
let endpointOut = 1;
let claimedInterface = 0;
let debugMode = true; // Log raw USB data to console

// ─── Connect / Disconnect ─────────────────────────────
async function handleConnect() {
  if (isConnected) {
    await disconnectDevice();
  } else {
    await connectDevice();
  }
}

async function connectDevice() {
  try {
    device = await navigator.usb.requestDevice({ filters: GS_USB_FILTERS });
    addSystemLog(`Selected device: ${device.productName || 'Unknown'} (VID:0x${device.vendorId.toString(16)}, PID:0x${device.productId.toString(16)})`);

    await device.open();
    addSystemLog('Device opened.');

    // Select configuration if needed
    if (device.configuration === null) {
      await device.selectConfiguration(1);
    }

    // Log all interfaces and endpoints for debugging
    addSystemLog(`Configuration ${device.configuration.configurationValue}: ${device.configuration.interfaces.length} interface(s)`);

    // Find the vendor-specific (gs_usb) interface — try each one
    let foundInterface = null;
    for (const iface of device.configuration.interfaces) {
      const alt = iface.alternate;
      addSystemLog(`  Interface ${iface.interfaceNumber}: class=0x${alt.interfaceClass.toString(16)}, subclass=0x${alt.interfaceSubclass.toString(16)}, endpoints=${alt.endpoints.length}`);

      for (const ep of alt.endpoints) {
        addSystemLog(`    EP ${ep.endpointNumber} dir=${ep.direction} type=${ep.type} packetSize=${ep.packetSize}`);
      }

      // gs_usb uses vendor class (0xFF) — but also accept if it has bulk in+out endpoints
      const hasBulkIn = alt.endpoints.some(e => e.direction === 'in' && e.type === 'bulk');
      const hasBulkOut = alt.endpoints.some(e => e.direction === 'out' && e.type === 'bulk');

      if (hasBulkIn && hasBulkOut) {
        foundInterface = iface;
        break;
      }
    }

    if (!foundInterface) {
      throw new Error('No suitable interface found with bulk IN + OUT endpoints. Make sure the device is running gs_usb compatible firmware (e.g. candleLight).');
    }

    claimedInterface = foundInterface.interfaceNumber;
    await device.claimInterface(claimedInterface);
    addSystemLog(`Claimed interface ${claimedInterface}.`);

    // Find bulk endpoints
    const alternate = foundInterface.alternate;
    for (const ep of alternate.endpoints) {
      if (ep.direction === 'in' && ep.type === 'bulk') {
        endpointIn = ep.endpointNumber;
      }
      if (ep.direction === 'out' && ep.type === 'bulk') {
        endpointOut = ep.endpointNumber;
      }
    }
    addSystemLog(`Using endpoints: IN=${endpointIn}, OUT=${endpointOut}`);

    // Get device config (number of channels)
    const configData = await gsUsbGetDeviceConfig();
    const numChannels = configData ? configData.icount + 1 : 1;

    // Update UI
    document.getElementById('infoVendor').textContent = device.manufacturerName || '—';
    document.getElementById('infoProduct').textContent = device.productName || 'gs_usb device';
    document.getElementById('infoVidPid').textContent =
      `0x${device.vendorId.toString(16).toUpperCase()}:0x${device.productId.toString(16).toUpperCase()}`;
    document.getElementById('infoChannels').textContent = numChannels;

    isConnected = true;
    updateConnectionUI();

    // Configure and start CAN
    await configureCAN();
    await startCAN();

    // Begin reading
    startReading();

    addSystemLog('CAN interface started — listening for frames.');
  } catch (err) {
    console.error('Connection failed:', err);
    addSystemLog(`Connection failed: ${err.message}`);
  }
}

async function disconnectDevice() {
  try {
    isStarted = false;
    stopRepeat(); // Stop any running repeat send
    stopAllSignals(); // Stop all signal toggles
    txQueue = []; // Flush pending TX frames
    readLoopRunning = false;

    // Stop CAN
    if (device && device.opened) {
      try { await stopCAN(); } catch(e) {}
      await device.releaseInterface(claimedInterface);
      await device.close();
    }

    device = null;
    isConnected = false;
    updateConnectionUI();
    addSystemLog('Device disconnected.');
  } catch (err) {
    console.error('Disconnect error:', err);
    device = null;
    isConnected = false;
    updateConnectionUI();
  }
}

// ─── gs_usb Protocol ──────────────────────────────────

async function gsUsbGetDeviceConfig() {
  try {
    const result = await device.controlTransferIn({
      requestType: 'vendor',
      recipient: 'interface',
      request: GS_USB_BREQ.DEVICE_CONFIG,
      value: 0,
      index: claimedInterface,
    }, 12);

    if (result.status === 'ok' && result.data) {
      const view = result.data;
      const icount = view.getUint8(3);
      const sw_version = view.getUint32(4, true);
      addSystemLog(`Device config: channels=${icount + 1}, sw_version=${sw_version}`);
      return {
        icount: icount,
        sw_version: sw_version,
      };
    }
  } catch (e) {
    console.warn('Could not get device config:', e);
    addSystemLog(`Device config query failed (non-critical): ${e.message}`);
  }
  return null;
}

async function gsUsbSetHostFormat() {
  // Host format: little-endian (0x0000BEEF)
  const data = new ArrayBuffer(4);
  const view = new DataView(data);
  view.setUint32(0, 0x0000BEEF, true);

  await device.controlTransferOut({
    requestType: 'vendor',
    recipient: 'interface',
    request: GS_USB_BREQ.HOST_FORMAT,
    value: 0,
    index: claimedInterface,
  }, data);
}

async function gsUsbSetBittiming(bitrate, brp, tseg1, tseg2, sjw) {
  const prop_seg = 0;

  const data = new ArrayBuffer(20);
  const view = new DataView(data);
  view.setUint32(0, prop_seg, true);
  view.setUint32(4, tseg1, true);
  view.setUint32(8, tseg2, true);
  view.setUint32(12, sjw, true);
  view.setUint32(16, brp, true);

  addSystemLog(`Writing bittiming: prop_seg=${prop_seg}, tseg1=${tseg1}, tseg2=${tseg2}, sjw=${sjw}, brp=${brp}`);

  await device.controlTransferOut({
    requestType: 'vendor',
    recipient: 'interface',
    request: GS_USB_BREQ.BITTIMING,
    value: 0,
    index: claimedInterface,
  }, data);
}

async function gsUsbSetMode(mode, flags) {
  const data = new ArrayBuffer(8);
  const view = new DataView(data);
  view.setUint32(0, mode, true);
  view.setUint32(4, flags, true);

  await device.controlTransferOut({
    requestType: 'vendor',
    recipient: 'interface',
    request: GS_USB_BREQ.MODE,
    value: 0,
    index: claimedInterface,
  }, data);
}

async function configureCAN() {
  const bitrate = parseInt(document.getElementById('bitrateSelect').value);
  await gsUsbSetHostFormat();

  // Query BT_CONST to get actual CAN clock frequency
  let canClock = 48000000; // default assumption
  try {
    const btResult = await device.controlTransferIn({
      requestType: 'vendor',
      recipient: 'interface',
      request: GS_USB_BREQ.BT_CONST,
      value: 0,
      index: claimedInterface,
    }, 40);

    if (btResult.status === 'ok' && btResult.data && btResult.data.byteLength >= 40) {
      const btView = btResult.data;
      // bt_const struct: feature(u32), fclk_can(u32), tseg1_min(u32), tseg1_max(u32),
      //                  tseg2_min(u32), tseg2_max(u32), sjw_max(u32), brp_min(u32),
      //                  brp_max(u32), brp_inc(u32)
      const features = btView.getUint32(0, true);
      canClock = btView.getUint32(4, true);
      const tseg1_min = btView.getUint32(8, true);
      const tseg1_max = btView.getUint32(12, true);
      const tseg2_min = btView.getUint32(16, true);
      const tseg2_max = btView.getUint32(20, true);
      const sjw_max = btView.getUint32(24, true);
      const brp_min = btView.getUint32(28, true);
      const brp_max = btView.getUint32(32, true);
      const brp_inc = btView.getUint32(36, true);

      addSystemLog(`CAN clock: ${(canClock/1e6).toFixed(1)} MHz, features=0x${features.toString(16)}`);
      addSystemLog(`BT limits: tseg1=[${tseg1_min}..${tseg1_max}], tseg2=[${tseg2_min}..${tseg2_max}], brp=[${brp_min}..${brp_max}]`);
    }
  } catch (e) {
    addSystemLog(`BT_CONST query failed, using default 48MHz clock: ${e.message}`);
  }

  // Compute bittiming from actual clock
  // Target: bitrate = canClock / (brp * (1 + tseg1 + tseg2))
  // We want tseg1 + tseg2 ≈ 15 total time quanta for good sample point (~87%)
  const numTq = 16; // 1 + tseg1 + tseg2 = 16
  const tseg1 = 13;
  const tseg2 = 2;
  const sjw = 1;
  const brp = Math.round(canClock / (bitrate * numTq));

  addSystemLog(`Computed bittiming for ${bitrate}bps: brp=${brp}, tseg1=${tseg1}, tseg2=${tseg2} (${numTq} TQ, clock=${canClock}Hz)`);

  // Verify
  const actualBitrate = canClock / (brp * numTq);
  const errorPct = Math.abs(actualBitrate - bitrate) / bitrate * 100;
  if (errorPct > 1) {
    addSystemLog(`WARNING: Actual bitrate ${actualBitrate.toFixed(0)}bps differs by ${errorPct.toFixed(1)}% from target!`);
  }

  await gsUsbSetBittiming(bitrate, brp, tseg1, tseg2, sjw);
}

async function startCAN() {
  let flags = 0;
  const mode = document.getElementById('modeSelect').value;
  if (mode === 'loopback') flags |= GS_CAN_FEATURE.LOOP_BACK;
  if (mode === 'listenonly') flags |= GS_CAN_FEATURE.LISTEN_ONLY;

  await gsUsbSetMode(GS_CAN_MODE.START, flags);
  isStarted = true;
}

async function stopCAN() {
  await gsUsbSetMode(GS_CAN_MODE.RESET, 0);
  isStarted = false;
}

// ─── CAN Frame Parsing (gs_host_frame) ────────────────
// gs_host_frame structure (20 bytes):
//   echo_id:    uint32 (offset 0)
//   can_id:     uint32 (offset 4)
//   can_dlc:    uint8  (offset 8)
//   channel:    uint8  (offset 9)
//   flags:      uint8  (offset 10)
//   reserved:   uint8  (offset 11)
//   data[8]:    uint8  (offset 12–19)

function parseGsHostFrame(buffer) {
  const view = new DataView(buffer);
  const echo_id = view.getUint32(0, true);
  const can_id = view.getUint32(4, true);
  const can_dlc = view.getUint8(8);
  const channel = view.getUint8(9);
  const flags = view.getUint8(10);

  const isExt = (can_id & 0x80000000) !== 0;
  const isRTR = (can_id & 0x40000000) !== 0;
  const isErr = (can_id & 0x20000000) !== 0;
  const rawId = isExt ? (can_id & 0x1FFFFFFF) : (can_id & 0x7FF);

  const dataBytes = [];
  for (let i = 0; i < Math.min(can_dlc, 8); i++) {
    dataBytes.push(view.getUint8(12 + i));
  }

  return {
    echo_id,
    id: rawId,
    dlc: can_dlc,
    data: dataBytes,
    channel,
    flags,
    isExtended: isExt,
    isRTR: isRTR,
    isError: isErr,
    isEcho: echo_id !== 0xFFFFFFFF,
  };
}

function buildGsHostFrame(canId, data, dlc, extended = false) {
  const buf = new ArrayBuffer(20);
  const view = new DataView(buf);

  // echo_id: 0 (will be echoed back)
  view.setUint32(0, 1, true);

  // can_id with flags
  let id = canId & (extended ? 0x1FFFFFFF : 0x7FF);
  if (extended) id |= 0x80000000;
  view.setUint32(4, id, true);

  // DLC
  view.setUint8(8, Math.min(dlc, 8));

  // channel, flags, reserved
  view.setUint8(9, 0);
  view.setUint8(10, 0);
  view.setUint8(11, 0);

  // data
  for (let i = 0; i < 8; i++) {
    view.setUint8(12 + i, i < data.length ? data[i] : 0);
  }

  return buf;
}

// ─── TX Queue (serialize all USB writes) ─────────────
// WebUSB transferOut is NOT safe to call concurrently.
// All sends go through this queue to prevent collisions.
let txQueue = [];
let txBusy = false;

async function queueTx(frameBuf, logFrame) {
  txQueue.push({ frameBuf, logFrame });
  if (!txBusy) drainTxQueue();
}

async function drainTxQueue() {
  if (txBusy) return;
  txBusy = true;

  while (txQueue.length > 0 && isConnected && device && device.opened) {
    const { frameBuf, logFrame } = txQueue.shift();
    try {
      await device.transferOut(endpointOut, frameBuf);
      txCount++;
      if (logFrame) addLogEntry('tx', logFrame);
    } catch (err) {
      console.error('TX queue error:', err);
      // Don't break the queue — skip this frame and continue
    }
  }

  txBusy = false;
}

// ─── Read Loop ────────────────────────────────────────
let readLoopRunning = false;

function startReading() {
  if (readLoopRunning) return; // prevent duplicate loops
  if (!device || !device.opened) return;

  readLoopRunning = true;
  addSystemLog(`Starting read loop on EP${endpointIn}...`);

  const read = async () => {
    let consecutiveErrors = 0;

    while (isConnected && device && device.opened) {
      try {
        const result = await device.transferIn(endpointIn, 64);

        if (result.status === 'ok' && result.data && result.data.byteLength >= 20) {
          consecutiveErrors = 0;

          const dv = result.data;
          const echo_id = dv.getUint32(0, true);
          const can_id_raw = dv.getUint32(4, true);
          const can_dlc = dv.getUint8(8);
          const channel = dv.getUint8(9);
          const flags = dv.getUint8(10);

          const isExt = (can_id_raw & 0x80000000) !== 0;
          const isRTR = (can_id_raw & 0x40000000) !== 0;
          const isErr = (can_id_raw & 0x20000000) !== 0;
          const rawId = isExt ? (can_id_raw & 0x1FFFFFFF) : (can_id_raw & 0x7FF);

          const dataBytes = [];
          for (let i = 0; i < Math.min(can_dlc, 8); i++) {
            dataBytes.push(dv.getUint8(12 + i));
          }

          if (debugMode) {
            const hexDump = [];
            for (let i = 0; i < dv.byteLength; i++) hexDump.push(dv.getUint8(i).toString(16).padStart(2, '0'));
            console.log(`[USB RX] ${dv.byteLength}B: ${hexDump.join(' ')} | echo_id=0x${echo_id.toString(16)} can_id=0x${can_id_raw.toString(16)} dlc=${can_dlc}`);
          }

          if (isErr) {
            errCount++;
            continue;
          }

          // echo_id == 0xFFFFFFFF means real bus frame; anything else is a TX echo
          if (echo_id !== 0xFFFFFFFF) {
            if (debugMode) console.log(`  -> TX echo (echo_id=${echo_id}), skipping`);
            continue;
          }

          rxCount++;

          addLogEntry('rx', {
            id: rawId,
            dlc: can_dlc,
            data: dataBytes,
            channel,
            flags,
            isExtended: isExt,
            isRTR,
          });

        } else if (result.status === 'ok' && result.data) {
          if (debugMode) {
            const hexDump = [];
            for (let i = 0; i < result.data.byteLength; i++) hexDump.push(result.data.getUint8(i).toString(16).padStart(2, '0'));
            console.log(`[USB RX] Short frame (${result.data.byteLength}B): ${hexDump.join(' ')}`);
          }
          consecutiveErrors = 0;
        } else if (result.status === 'stall') {
          addSystemLog('Endpoint stalled — clearing halt.');
          await device.clearHalt('in', endpointIn);
          consecutiveErrors = 0;
        } else if (result.status === 'babble') {
          addSystemLog('Babble error on endpoint.');
        }

      } catch (err) {
        if (!isConnected) break;

        consecutiveErrors++;
        console.error(`Read error (${consecutiveErrors}):`, err);
        errCount++;

        // Short pause, then keep trying — do NOT break
        await new Promise(r => setTimeout(r, 50));
      }
    }

    readLoopRunning = false;

    // Auto-restart if still connected (loop exited unexpectedly)
    if (isConnected && device && device.opened) {
      addSystemLog('Read loop exited — restarting...');
      await new Promise(r => setTimeout(r, 200));
      if (isConnected && device && device.opened) {
        readLoopRunning = true;
        read(); // restart
      }
    }
  };

  read();
}

// ─── Send CAN Frame ───────────────────────────────────
async function handleSend() {
  if (!isConnected || !device) {
    addSystemLog('Not connected. Connect a device first.');
    return;
  }

  const idHex = document.getElementById('sendId').value.trim();
  const dlc = parseInt(document.getElementById('sendDlc').value) || 8;
  const dataStr = document.getElementById('sendData').value.trim();

  const canId = parseInt(idHex, 16);
  if (isNaN(canId)) {
    addSystemLog('Invalid CAN ID.');
    return;
  }

  const dataBytes = dataStr
    ? dataStr.split(/[\s,]+/).map(b => parseInt(b, 16)).filter(b => !isNaN(b))
    : [];

  // Pad to DLC
  while (dataBytes.length < dlc) dataBytes.push(0);

  const isExtended = canId > 0x7FF;
  const frameBuf = buildGsHostFrame(canId, dataBytes, dlc, isExtended);

  queueTx(frameBuf, {
    id: canId,
    dlc: dlc,
    data: dataBytes.slice(0, dlc),
    isExtended,
  });
}

function quickSend(id, dataStr) {
  document.getElementById('sendId').value = id;
  document.getElementById('sendData').value = dataStr;
  document.getElementById('sendDlc').value = dataStr.split(/\s+/).length;
  handleSend();
}

// ─── Interval / Repeat Send ──────────────────────────
let repeatTimer = null;
let repeatCount = 0;

function toggleRepeat() {
  if (repeatTimer !== null) {
    stopRepeat();
  } else {
    startRepeat();
  }
}

function startRepeat() {
  if (!isConnected || !device) {
    addSystemLog('Not connected. Connect a device first.');
    return;
  }

  const intervalMs = parseInt(document.getElementById('intervalMs').value);
  if (isNaN(intervalMs) || intervalMs < 1) {
    addSystemLog('Invalid interval. Enter a value in milliseconds (min 1).');
    return;
  }

  // Snapshot the frame parameters at start so edits don't affect the running loop
  const idHex = document.getElementById('sendId').value.trim();
  const dlc = parseInt(document.getElementById('sendDlc').value) || 8;
  const dataStr = document.getElementById('sendData').value.trim();

  const canId = parseInt(idHex, 16);
  if (isNaN(canId)) {
    addSystemLog('Invalid CAN ID.');
    return;
  }

  const dataBytes = dataStr
    ? dataStr.split(/[\s,]+/).map(b => parseInt(b, 16)).filter(b => !isNaN(b))
    : [];
  while (dataBytes.length < dlc) dataBytes.push(0);

  const isExtended = canId > 0x7FF;
  repeatCount = 0;

  // Update UI
  const btn = document.getElementById('repeatBtn');
  btn.classList.add('active');
  btn.textContent = 'Stop';

  // Disable editing while repeating
  document.getElementById('sendId').disabled = true;
  document.getElementById('sendDlc').disabled = true;
  document.getElementById('sendData').disabled = true;
  document.getElementById('intervalMs').disabled = true;

  const idStr = isExtended
    ? canId.toString(16).toUpperCase().padStart(8, '0')
    : canId.toString(16).toUpperCase().padStart(3, '0');
  addSystemLog(`Repeat TX started: ID=0x${idStr}, every ${intervalMs}ms`);

  const sendOne = () => {
    if (!isConnected || !device || !device.opened) {
      stopRepeat();
      return;
    }

    repeatCount++;
    const frameBuf = buildGsHostFrame(canId, dataBytes, dlc, isExtended);
    queueTx(frameBuf, {
      id: canId,
      dlc: dlc,
      data: dataBytes.slice(0, dlc),
      isExtended,
    });
  };

  // Send first frame immediately, then set interval
  sendOne();
  repeatTimer = setInterval(sendOne, intervalMs);
}

function stopRepeat() {
  if (repeatTimer !== null) {
    clearInterval(repeatTimer);
    repeatTimer = null;
  }

  const btn = document.getElementById('repeatBtn');
  btn.classList.remove('active');
  btn.textContent = 'Repeat';

  // Re-enable editing
  document.getElementById('sendId').disabled = false;
  document.getElementById('sendDlc').disabled = false;
  document.getElementById('sendData').disabled = false;
  document.getElementById('intervalMs').disabled = false;

  if (repeatCount > 0) {
    addSystemLog(`Repeat TX stopped after ${repeatCount} frames.`);
  }
  repeatCount = 0;
}

// ─── Signals (toggleable periodic CAN messages) ──────

let signals = [
  // Default signals — user can add/remove
  { id: 'sig_1', name: 'Turn Left', canId: 0x470, data: [0x01, 0,0,0,0,0,0,0], intervalMs: 50, active: false, timer: null },
  { id: 'sig_2', name: 'Turn Right', canId: 0x470, data: [0x02, 0,0,0,0,0,0,0], intervalMs: 50, active: false, timer: null },
  { id: 'sig_3', name: 'Hazards', canId: 0x470, data: [0x03, 0,0,0,0,0,0,0], intervalMs: 50, active: false, timer: null },
  { id: 'sig_4', name: 'RPM', canId: 0x280, data: [0x00, 0x00, 0x00, 0x22, 0x00], intervalMs: 50, active: false, timer: null },
];
let sigCounter = 5;

function renderSignals() {
  const list = document.getElementById('signalList');
  list.innerHTML = '';

  if (signals.length === 0) {
    list.innerHTML = '<div style="font-size:11px; color:var(--text-muted); padding:4px 0;">No signals configured. Add one below.</div>';
    return;
  }

  for (const sig of signals) {
    const idHex = sig.canId > 0x7FF
      ? sig.canId.toString(16).toUpperCase().padStart(8, '0')
      : sig.canId.toString(16).toUpperCase().padStart(3, '0');
    const dataHex = sig.data.map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(' ');

    const row = document.createElement('div');
    row.className = 'signal-row' + (sig.active ? ' active' : '');
    row.id = 'sigrow_' + sig.id;
    row.innerHTML = `
      <div class="signal-toggle ${sig.active ? 'on' : ''}" onclick="toggleSignal('${sig.id}')" title="Click to toggle"></div>
      <div class="signal-info">
        <div class="signal-name">${sig.name}</div>
        <div class="signal-detail">0x${idHex} | ${dataHex} | ${sig.intervalMs}ms</div>
      </div>
      <button class="signal-remove" onclick="removeSignal('${sig.id}')" title="Remove">&#10005;</button>
    `;
    list.appendChild(row);
  }
}

function toggleSignal(sigId) {
  const sig = signals.find(s => s.id === sigId);
  if (!sig) return;

  if (sig.active) {
    // Stop
    stopSignal(sig);
  } else {
    // Start
    startSignal(sig);
  }

  renderSignals();
}

function startSignal(sig) {
  if (!isConnected || !device) {
    addSystemLog('Not connected. Connect a device first.');
    return;
  }

  const canId = sig.canId;
  const data = sig.data.slice();
  const dlc = data.length;
  const isExtended = canId > 0x7FF;

  const sendFrame = () => {
    if (!isConnected || !device || !device.opened) {
      stopSignal(sig);
      renderSignals();
      return;
    }

    const frameBuf = buildGsHostFrame(canId, data, dlc, isExtended);
    queueTx(frameBuf, { id: canId, dlc, data, isExtended });
  };

  sig.active = true;
  sendFrame(); // send first immediately
  sig.timer = setInterval(sendFrame, sig.intervalMs);

  const idHex = canId.toString(16).toUpperCase();
  addSystemLog(`Signal "${sig.name}" ON (0x${idHex} every ${sig.intervalMs}ms)`);
}

function stopSignal(sig) {
  if (sig.timer !== null) {
    clearInterval(sig.timer);
    sig.timer = null;
  }

  const wasActive = sig.active;
  sig.active = false;

  if (wasActive) {
    const idHex = sig.canId.toString(16).toUpperCase();
    addSystemLog(`Signal "${sig.name}" OFF`);
  }
}

function stopAllSignals() {
  for (const sig of signals) {
    stopSignal(sig);
  }
  renderSignals();
}

function addSignal() {
  const name = document.getElementById('newSigName').value.trim() || `Signal ${sigCounter}`;
  const idHex = document.getElementById('newSigId').value.trim();
  const dataStr = document.getElementById('newSigData').value.trim();
  const ms = parseInt(document.getElementById('newSigMs').value) || 50;

  const canId = parseInt(idHex, 16);
  if (isNaN(canId)) {
    addSystemLog('Invalid CAN ID for signal.');
    return;
  }

  const dataBytes = dataStr
    ? dataStr.split(/[\s,]+/).map(b => parseInt(b, 16)).filter(b => !isNaN(b))
    : [];
  while (dataBytes.length < 8) dataBytes.push(0);

  signals.push({
    id: 'sig_' + sigCounter++,
    name: name,
    canId: canId,
    data: dataBytes.slice(0, 8),
    intervalMs: Math.max(1, ms),
    active: false,
    timer: null,
  });

  // Clear form
  document.getElementById('newSigName').value = '';
  document.getElementById('newSigId').value = '';
  document.getElementById('newSigData').value = '';
  document.getElementById('newSigMs').value = '50';

  renderSignals();
  addSystemLog(`Signal "${name}" added.`);
}

function removeSignal(sigId) {
  const idx = signals.findIndex(s => s.id === sigId);
  if (idx === -1) return;

  // Stop if active
  stopSignal(signals[idx]);
  const name = signals[idx].name;
  signals.splice(idx, 1);
  renderSignals();
  addSystemLog(`Signal "${name}" removed.`);
}

// Initial render
renderSignals();

// ─── UI Helpers ───────────────────────────────────────

function updateConnectionUI() {
  const chip = document.getElementById('statusChip');
  const text = document.getElementById('statusText');
  const btn = document.getElementById('connectBtn');

  if (isConnected) {
    chip.className = 'status-chip connected';
    text.textContent = 'Connected';
    btn.className = 'btn btn-danger';
    btn.innerHTML = '&#9632; Disconnect';
  } else {
    chip.className = 'status-chip disconnected';
    text.textContent = 'Disconnected';
    btn.className = 'btn btn-primary';
    btn.innerHTML = '&#9654; Connect Device';

    document.getElementById('infoVendor').textContent = '—';
    document.getElementById('infoProduct').textContent = '—';
    document.getElementById('infoVidPid').textContent = '—';
    document.getElementById('infoChannels').textContent = '—';
  }
}

function addLogEntry(dir, frame) {
  const now = new Date();
  const time = now.toLocaleTimeString('en-US', { hour12: false }) +
    '.' + String(now.getMilliseconds()).padStart(3, '0');

  const idStr = frame.isExtended
    ? frame.id.toString(16).toUpperCase().padStart(8, '0')
    : frame.id.toString(16).toUpperCase().padStart(3, '0');

  const dataStr = frame.data.map(b =>
    b.toString(16).toUpperCase().padStart(2, '0')
  ).join(' ');

  const entry = { time, dir, id: idStr, data: dataStr, dlc: frame.dlc };
  logEntries.push(entry);

  // Keep max 10000 entries in memory (for export/filter)
  if (logEntries.length > 10000) logEntries.shift();

  // Buffer for next render tick — rendering is throttled separately
  pendingRender.push(entry);
}

// ─── Throttled Renderer ──────────────────────────────
// Renders at most every RENDER_INTERVAL ms, and caps DOM entries.
// This keeps the UI responsive even at 2000+ frames/sec.

let pendingRender = [];
let isPaused = false;
let pauseBuffer = [];
const RENDER_INTERVAL = 200;  // ms — render at most 5x per second
const MAX_DOM_ENTRIES = 500;   // keep DOM small
const MAX_RENDER_BATCH = 100;  // max rows to add per render tick

function renderTick() {
  // Always schedule next tick
  setTimeout(renderTick, RENDER_INTERVAL);

  // Update stat counters (cheap — no layout reflow)
  document.getElementById('rxCount').textContent = rxCount;
  document.getElementById('txCount').textContent = txCount;
  document.getElementById('errCount').textContent = errCount;

  if (isPaused) {
    // Buffer entries while paused
    if (pendingRender.length > 0) {
      pauseBuffer.push(...pendingRender);
      pendingRender = [];
      // Cap pause buffer too
      if (pauseBuffer.length > 10000) pauseBuffer = pauseBuffer.slice(-10000);
      document.getElementById('pauseBtn').textContent = `Resume (${pauseBuffer.length})`;
    }
    return;
  }

  const entries = pendingRender;
  pendingRender = [];

  if (entries.length === 0) return;

  const scroll = document.getElementById('logScroll');
  const filterInput = document.getElementById('filterInput').value.trim().toUpperCase();
  const fragment = document.createDocumentFragment();
  let added = 0;

  // If there are more entries than we can render, skip older ones
  const startIdx = Math.max(0, entries.length - MAX_RENDER_BATCH);

  for (let i = startIdx; i < entries.length; i++) {
    const entry = entries[i];
    if (currentFilter !== 'all' && entry.dir !== currentFilter) continue;
    if (filterInput && !entry.id.includes(filterInput)) continue;

    const div = document.createElement('div');
    div.className = entry.dir === 'tx' ? 'log-entry tx-row' : 'log-entry';
    div.innerHTML = `<span class="log-time">${entry.time}</span><span class="log-dir ${entry.dir}">${entry.dir.toUpperCase()}</span><span class="log-id">${entry.id}</span><span class="log-data">${entry.data}</span><span class="log-dlc">[${entry.dlc}]</span>`;
    fragment.appendChild(div);
    added++;
  }

  if (added === 0) return;

  // Remove empty state
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();

  scroll.appendChild(fragment);

  // Trim DOM — remove from top
  while (scroll.children.length > MAX_DOM_ENTRIES) {
    scroll.removeChild(scroll.firstChild);
  }

  // Auto-scroll (single reflow at the end)
  if (document.getElementById('autoScroll').checked) {
    scroll.scrollTop = scroll.scrollHeight;
  }

  // Show dropped count if we skipped frames
  if (startIdx > 0) {
    const skipped = startIdx;
    console.log(`[Render] Skipped ${skipped} frames to keep UI responsive`);
  }
}

// Start the render timer
setTimeout(renderTick, RENDER_INTERVAL);

// ─── Pause / Resume ──────────────────────────────────

function togglePause() {
  isPaused = !isPaused;
  const btn = document.getElementById('pauseBtn');

  if (isPaused) {
    btn.textContent = 'Resume (0)';
    btn.style.borderColor = 'rgba(245, 158, 11, 0.4)';
    btn.style.color = 'var(--accent-amber)';
    btn.style.background = 'rgba(245, 158, 11, 0.1)';
  } else {
    btn.textContent = 'Pause';
    btn.style.borderColor = '';
    btn.style.color = '';
    btn.style.background = '';

    // Flush buffered entries — only render the tail
    if (pauseBuffer.length > 0) {
      const tail = pauseBuffer.slice(-MAX_RENDER_BATCH);
      pendingRender.push(...tail);
      if (pauseBuffer.length > MAX_RENDER_BATCH) {
        addSystemLog(`Resumed — showing last ${MAX_RENDER_BATCH} of ${pauseBuffer.length} buffered frames.`);
      }
      pauseBuffer = [];
    }
  }
}

function addSystemLog(msg) {
  const scroll = document.getElementById('logScroll');
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();

  const div = document.createElement('div');
  div.style.cssText = `
    padding: 8px 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent-amber);
    opacity: 0.8;
    border-bottom: 1px solid rgba(30, 45, 74, 0.3);
  `;
  div.textContent = `[SYS] ${msg}`;
  scroll.appendChild(div);

  if (document.getElementById('autoScroll').checked) {
    scroll.scrollTop = scroll.scrollHeight;
  }
}

function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  rebuildLog();
}

document.getElementById('filterInput').addEventListener('input', rebuildLog);

function rebuildLog() {
  const scroll = document.getElementById('logScroll');
  scroll.innerHTML = '';

  if (logEntries.length === 0) {
    scroll.innerHTML = `
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">&#128268;</div>
        <h3>No CAN messages yet</h3>
        <p>Connect your gs_usb compatible CAN adapter to start capturing CAN bus traffic.</p>
      </div>`;
    return;
  }

  const filterInput = document.getElementById('filterInput').value.trim().toUpperCase();
  const fragment = document.createDocumentFragment();

  // Only render the last MAX_DOM_ENTRIES matching entries
  const matching = logEntries.filter(entry => {
    if (currentFilter !== 'all' && entry.dir !== currentFilter) return false;
    if (filterInput && !entry.id.includes(filterInput)) return false;
    return true;
  });

  const start = Math.max(0, matching.length - MAX_DOM_ENTRIES);
  for (let i = start; i < matching.length; i++) {
    const entry = matching[i];
    const div = document.createElement('div');
    div.className = entry.dir === 'tx' ? 'log-entry tx-row' : 'log-entry';
    div.innerHTML = `<span class="log-time">${entry.time}</span><span class="log-dir ${entry.dir}">${entry.dir.toUpperCase()}</span><span class="log-id">${entry.id}</span><span class="log-data">${entry.data}</span><span class="log-dlc">[${entry.dlc}]</span>`;
    fragment.appendChild(div);
  }

  scroll.appendChild(fragment);

  if (document.getElementById('autoScroll').checked) {
    scroll.scrollTop = scroll.scrollHeight;
  }
}

function clearLog() {
  logEntries = [];
  rxCount = 0; txCount = 0; errCount = 0;
  document.getElementById('rxCount').textContent = '0';
  document.getElementById('txCount').textContent = '0';
  document.getElementById('errCount').textContent = '0';
  rebuildLog();
}

function exportLog() {
  if (logEntries.length === 0) {
    addSystemLog('No log entries to export.');
    return;
  }

  let csv = 'Timestamp,Direction,ID,DLC,Data\n';
  logEntries.forEach(e => {
    csv += `${e.time},${e.dir},${e.id},${e.dlc},"${e.data}"\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `can_log_${Date.now()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  addSystemLog('Log exported as CSV.');
}

// Enter key to send
document.getElementById('sendData').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSend();
});

// Handle disconnection events
navigator.usb.addEventListener('disconnect', event => {
  if (device && event.device === device) {
    stopRepeat();
    stopAllSignals();
    isConnected = false;
    isStarted = false;
    device = null;
    updateConnectionUI();
    addSystemLog('Device was disconnected.');
  }
});

// WebUSB support check
if (!navigator.usb) {
  addSystemLog('WebUSB is not supported in this browser. Please use Chrome or Edge.');
}
</script>
