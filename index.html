<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebUSB CAN — Browser-based CAN Bus Interface</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app" id="app">
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo" style="background:linear-gradient(135deg, #10b981, #059669);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
          <rect x="6" y="6" width="12" height="12" rx="2"/>
          <line x1="1" y1="10" x2="6" y2="10"/>
          <line x1="1" y1="14" x2="6" y2="14"/>
          <line x1="18" y1="10" x2="23" y2="10"/>
          <line x1="18" y1="14" x2="23" y2="14"/>
          <line x1="10" y1="1" x2="10" y2="6"/>
          <line x1="14" y1="1" x2="14" y2="6"/>
          <line x1="10" y1="18" x2="10" y2="23"/>
          <line x1="14" y1="18" x2="14" y2="23"/>
        </svg>
      </div>
      <div class="header-title">WebUSB<span>CAN</span></div>
    </div>
    <div id="statusChip" class="status-chip disconnected">
      <div class="status-dot"></div>
      <span id="statusText">Disconnected</span>
    </div>
  </header>

  <!-- Main Grid -->
  <div class="main">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="panel-title">Connection</div>

      <div class="card" id="connectCard">
        <button id="connectBtn" class="btn btn-primary" onclick="handleConnect()">
          &#9654; Connect Device
        </button>
      </div>

      <div class="card">
        <div class="form-group">
          <label>Bitrate</label>
          <select id="bitrateSelect">
            <option value="10000">10 kbit/s</option>
            <option value="20000">20 kbit/s</option>
            <option value="50000">50 kbit/s</option>
            <option value="100000">100 kbit/s</option>
            <option value="125000">125 kbit/s</option>
            <option value="250000">250 kbit/s</option>
            <option value="500000" selected>500 kbit/s</option>
            <option value="800000">800 kbit/s</option>
            <option value="1000000">1 Mbit/s</option>
          </select>
        </div>
        <div class="form-group">
          <label>Mode</label>
          <select id="modeSelect">
            <option value="normal">Normal</option>
            <option value="loopback">Loopback</option>
            <option value="listenonly">Listen Only</option>
          </select>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="autoScroll" checked>
          <label for="autoScroll">Auto-scroll log</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="debugToggle" checked onchange="state.debugMode = this.checked">
          <label for="debugToggle">Debug to console (F12)</label>
        </div>
      </div>

      <div class="panel-title">Device Info</div>
      <div class="card" id="deviceInfoCard">
        <div class="device-info-grid" id="deviceInfo">
          <div class="info-item">
            <div class="info-label">Vendor</div>
            <div class="info-value" id="infoVendor">—</div>
          </div>
          <div class="info-item">
            <div class="info-label">Product</div>
            <div class="info-value" id="infoProduct">—</div>
          </div>
          <div class="info-item">
            <div class="info-label">VID:PID</div>
            <div class="info-value" id="infoVidPid">—</div>
          </div>
          <div class="info-item">
            <div class="info-label">Channels</div>
            <div class="info-value" id="infoChannels">—</div>
          </div>
        </div>
      </div>

      <div class="panel-title">Signals</div>
      <div class="card">
        <div class="signal-list" id="signalList">
          <!-- Signals will be rendered here -->
        </div>
        <div class="add-signal-form">
          <div class="add-signal-row">
            <input type="text" id="newSigName" class="sig-name-input" placeholder="Name">
            <input type="text" id="newSigId" class="sig-id-input" placeholder="ID (hex)">
          </div>
          <div class="add-signal-row">
            <input type="text" id="newSigData" class="sig-data-input" placeholder="Data (hex bytes)">
            <input type="number" id="newSigMs" class="sig-ms-input" placeholder="ms" min="10" max="5000" value="50">
          </div>
          <button class="btn btn-sm" onclick="addSignal()" style="margin-top:2px;">+ Add Signal</button>
        </div>
      </div>

      <div class="panel-title">OBD-II Queries</div>
      <div class="card">
        <div class="form-group">
          <label>One-shot requests</label>
          <div style="display:flex; gap:6px; flex-wrap:wrap; margin-top:4px;">
            <button class="btn btn-sm" onclick="quickSend('7DF','02 01 0C')">RPM</button>
            <button class="btn btn-sm" onclick="quickSend('7DF','02 01 0D')">Speed</button>
            <button class="btn btn-sm" onclick="quickSend('7DF','02 01 05')">Coolant</button>
          </div>
        </div>
      </div>
    </aside>

    <!-- Content Area -->
    <div class="log-area">
      <!-- Stats Bar -->
      <div class="stats-bar">
        <div class="stat">
          <span class="stat-label">RX</span>
          <span class="stat-value" id="rxCount">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">TX</span>
          <span class="stat-value" id="txCount">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Errors</span>
          <span class="stat-value" id="errCount">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Bus Load</span>
          <span class="stat-value" id="busLoad">—</span>
        </div>
        <div style="flex:1"></div>
        <button id="pauseBtn" class="btn btn-sm" onclick="togglePause()">Pause</button>
        <button class="btn btn-sm" onclick="clearLog()">Clear Log</button>
        <button class="btn btn-sm" onclick="exportLog()">Export CSV</button>
      </div>

      <!-- Log Toolbar -->
      <div class="log-toolbar">
        <div class="log-toolbar-left">
          <span class="filter-chip active" onclick="setFilter('all', this)">All</span>
          <span class="filter-chip" onclick="setFilter('rx', this)">RX</span>
          <span class="filter-chip" onclick="setFilter('tx', this)">TX</span>
        </div>
        <input type="text" id="filterInput" placeholder="Filter by ID (hex)..." style="width:160px; font-size:12px; padding:5px 10px;">
      </div>

      <!-- Log entries -->
      <div class="log-scroll" id="logScroll">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">&#128268;</div>
          <h3>No CAN messages yet</h3>
          <p>Connect your gs_usb compatible CAN adapter to start capturing CAN bus traffic.</p>
        </div>
      </div>

      <!-- Send Bar -->
      <div class="send-bar">
        <input type="text" id="sendId" class="id-input" placeholder="ID (hex)" maxlength="8" value="7DF">
        <input type="number" id="sendDlc" class="dlc-input" placeholder="DLC" min="0" max="8" value="8">
        <input type="text" id="sendData" placeholder="Data bytes (hex, e.g. 02 01 0C 00 00 00 00 00)" value="">
        <button class="btn btn-success btn-sm" onclick="handleSend()" style="width:auto; min-width:70px;">Send</button>
        <div class="interval-group">
          <input type="number" id="intervalMs" class="interval-input" placeholder="ms" min="1" max="60000" value="100">
          <span class="interval-label">ms</span>
          <button id="repeatBtn" class="btn btn-repeat btn-sm" onclick="toggleRepeat()" style="width:auto; min-width:80px;">Repeat</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
